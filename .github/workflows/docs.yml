name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build packages
        run: vp run build

      - name: Build docs
        run: cd docs && npx waku build

      - name: Build Vite example
        run: cd examples/with-vite && DEPLOY_BASE=/seams/examples/vite/ vp build
        env:
          DEPLOY_BASE: /seams/examples/vite/

      - name: Build Next.js example
        run: cd examples/with-nextjs && npx next build --webpack
        env:
          DEPLOY_BASE: /seams/examples/nextjs

      - name: Assemble site
        run: |
          mkdir -p docs/dist/public/examples/vite
          mkdir -p docs/dist/public/examples/nextjs
          cp -r examples/with-vite/dist/* docs/dist/public/examples/vite/
          cp -r examples/with-nextjs/out/* docs/dist/public/examples/nextjs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
