<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="threadGrad1" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0066FF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="threadGrad2" x1="1200" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#0066FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="threadGrad3" x1="0" y1="150" x2="1200" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0066FF" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative thread lines (seams motif) -->
  <path d="M-20 280 Q200 200 400 220 T800 180 T1220 240" stroke="url(#threadGrad1)" stroke-width="1.5" fill="none"/>
  <path d="M-20 260 Q300 180 500 200 T900 160 T1220 200" stroke="url(#threadGrad1)" stroke-width="1" fill="none"/>
  <path d="M-20 40 Q200 100 500 80 T900 120 T1220 60" stroke="url(#threadGrad2)" stroke-width="1.5" fill="none"/>
  <path d="M-20 60 Q300 120 600 100 T1000 140 T1220 80" stroke="url(#threadGrad2)" stroke-width="1" fill="none"/>

  <!-- Horizontal thread lines -->
  <line x1="0" y1="148" x2="1200" y2="148" stroke="url(#threadGrad3)" stroke-width="0.5"/>
  <line x1="0" y1="152" x2="1200" y2="152" stroke="url(#threadGrad3)" stroke-width="0.5"/>

  <!-- Stitch marks along the horizontal seam -->
  <g stroke="#0066FF" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round">
    <line x1="80" y1="144" x2="88" y2="156"/>
    <line x1="120" y1="144" x2="128" y2="156"/>
    <line x1="160" y1="144" x2="168" y2="156"/>
    <line x1="200" y1="144" x2="208" y2="156"/>
    <line x1="240" y1="144" x2="248" y2="156"/>
    <line x1="960" y1="144" x2="968" y2="156"/>
    <line x1="1000" y1="144" x2="1008" y2="156"/>
    <line x1="1040" y1="144" x2="1048" y2="156"/>
    <line x1="1080" y1="144" x2="1088" y2="156"/>
    <line x1="1120" y1="144" x2="1128" y2="156"/>
  </g>

  <!-- Corner dots -->
  <circle cx="30" cy="30" r="2" fill="#0066FF" opacity="0.3"/>
  <circle cx="1170" cy="30" r="2" fill="#7C3AED" opacity="0.3"/>
  <circle cx="30" cy="270" r="2" fill="#7C3AED" opacity="0.3"/>
  <circle cx="1170" cy="270" r="2" fill="#0066FF" opacity="0.3"/>

  <!-- Logo text -->
  <text x="600" y="130" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="url(#accent)">Seams</text>

  <!-- Tagline -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94A3B8" letter-spacing="0.5">Zero-runtime CSS-in-JS for React Server Components</text>

  <!-- Badges row -->
  <g transform="translate(600, 210)" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="13">
    <!-- @layer badge -->
    <rect x="-280" y="-14" width="80" height="28" rx="14" fill="#0066FF" fill-opacity="0.12" stroke="#0066FF" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-240" y="5" fill="#60A5FA">@layer</text>

    <!-- @scope badge -->
    <rect x="-170" y="-14" width="84" height="28" rx="14" fill="#7C3AED" fill-opacity="0.12" stroke="#7C3AED" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-128" y="5" fill="#A78BFA">@scope</text>

    <!-- RSC badge -->
    <rect x="-56" y="-14" width="112" height="28" rx="14" fill="#059669" fill-opacity="0.12" stroke="#059669" stroke-opacity="0.25" stroke-width="1"/>
    <text x="0" y="5" fill="#34D399">RSC ready</text>

    <!-- SSR badge -->
    <rect x="86" y="-14" width="112" height="28" rx="14" fill="#D97706" fill-opacity="0.12" stroke="#D97706" stroke-opacity="0.25" stroke-width="1"/>
    <text x="142" y="5" fill="#FBBF24">SSR ready</text>

    <!-- Stitches API badge -->
    <rect x="228" y="-14" width="120" height="28" rx="14" fill="#94A3B8" fill-opacity="0.08" stroke="#94A3B8" stroke-opacity="0.2" stroke-width="1"/>
    <text x="288" y="5" fill="#94A3B8">Stitches API</text>
  </g>

  <!-- Install command -->
  <rect x="400" y="250" width="400" height="32" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="420" y="271" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="13" fill="#64748B">$</text>
  <text x="436" y="271" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="13" fill="#E2E8F0">npm install @artmsilva/seams-react</text>
</svg>
